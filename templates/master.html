{% extends "base.html" %}

{% block title %}Master — {{ current_name }}{% endblock %}

{% block body %}
<div class="container">
    <aside class="sidebar">
        <h1 class="site-title">{{ current_name }} — master</h1>
        <p><a href="{{ url_for('topic_view', topic_slug=current_slug) }}">← back to chapter view</a></p>
        <form method="post" action="{{ url_for('master_rebuild', course_slug=current_slug) }}">
            <button type="submit">Rebuild master now</button>
        </form>
        <a class="pdf-link" href="{{ url_for('master_pdf', course_slug=current_slug) }}">
            ⬇ Download as PDF
        </a>
        {% if anchors %}
        <nav class="sidebar-nav">
            {% for a in anchors %}
            <a href="#{{ a.id }}">{{ a.title }}</a>
            {% endfor %}
        </nav>
        {% endif %}
    </aside>
    <main class="main-content">
        <article class="markdown-content">
            {{ content | safe }}
        </article>
    </main>
</div>
{% endblock %}
